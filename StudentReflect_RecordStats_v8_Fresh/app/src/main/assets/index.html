<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>学生状态记录</title>
<style>
:root{--b:#e5e7eb;--t:#111827;--m:#2563eb;--g:#16a34a;--r:#dc2626;--y:#ca8a04;--bg:#f8fafc;--card:#fff}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:15px}.top{position:sticky;top:0;z-index:5;background:#fff;border-bottom:1px solid var(--b);padding:10px}.title{font-weight:800;font-size:18px;margin-bottom:8px}.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px}.metric{background:#f1f5f9;border-radius:12px;padding:6px;text-align:center}.metric b{display:block;font-size:15px}.metric span{font-size:11px;color:#64748b}.tabs{display:flex;gap:6px;overflow-x:auto;padding:8px 10px;background:#fff;border-bottom:1px solid var(--b)}.tabs button{white-space:nowrap}.page{display:none;padding:12px}.page.active{display:block}.card{background:var(--card);border:1px solid var(--b);border-radius:16px;padding:12px;margin-bottom:12px;box-shadow:0 1px 2px rgba(0,0,0,.03)}h2{font-size:18px;margin:0 0 10px}h3{font-size:16px;margin:8px 0}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.between{display:flex;justify-content:space-between;gap:8px;align-items:center}.btn,button{border:0;border-radius:12px;padding:10px 12px;background:#e5e7eb;color:#111;font-weight:700}.btn.primary,button.primary{background:var(--m);color:#fff}.btn.good{background:var(--g);color:#fff}.btn.bad{background:var(--r);color:#fff}.btn.warn{background:var(--y);color:#fff}.btn.small,button.small{padding:6px 8px;border-radius:9px;font-size:12px}.pill{display:inline-block;border-radius:999px;padding:4px 8px;background:#eef2ff;color:#3730a3;font-size:12px;margin:2px}.danger{background:#fee2e2;color:#991b1b}.ok{background:#dcfce7;color:#166534}.warnpill{background:#fef3c7;color:#92400e}input,select,textarea{width:100%;border:1px solid var(--b);border-radius:12px;padding:10px;background:#fff;font-size:15px}textarea{min-height:90px}.two{display:grid;grid-template-columns:1fr 1fr;gap:8px}.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}.bigtime{font-size:42px;text-align:center;font-weight:900;letter-spacing:1px}.sub{color:#64748b;font-size:13px}.listitem{border:1px solid var(--b);border-radius:12px;padding:10px;margin:8px 0;background:#fff}.typecard{border:1px solid var(--b);border-radius:12px;padding:9px;margin:5px 0;background:#f8fafc}.typecard.selected{outline:3px solid #93c5fd;background:#eff6ff}.checkgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}.checkbtn{background:#f8fafc;border:1px solid var(--b);text-align:left}.checkbtn.selected{background:#dbeafe;border-color:#60a5fa}.timeline{border-left:3px solid #cbd5e1;margin-left:8px;padding-left:10px}.seg{position:relative;margin:10px 0;padding:10px;border:1px solid var(--b);border-radius:12px;background:#fff}.seg:before{content:"";position:absolute;left:-18px;top:14px;width:10px;height:10px;border-radius:99px;background:#64748b}.seg.learn:before{background:#16a34a}.seg.bad:before{background:#dc2626}.scorebar{height:10px;background:#e5e7eb;border-radius:99px;overflow:hidden}.scorebar i{display:block;height:100%;background:#2563eb}.muted{opacity:.65}.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.hidden{display:none}.notice{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;border-radius:12px;padding:10px}pre{white-space:pre-wrap;word-break:break-all;background:#0f172a;color:#d1d5db;border-radius:12px;padding:10px;max-height:240px;overflow:auto}
</style>
</head>
<body>
<div class="top">
 <div class="title">学生状态记录 v8</div>
 <div class="grid">
  <div class="metric"><b id="mLearn">0:00</b><span>学习</span></div>
  <div class="metric"><b id="mDeep">0:00</b><span>深度</span></div>
  <div class="metric"><b id="mBad">0次</b><span>违规</span></div>
  <div class="metric"><b id="mCur">0:00</b><span>当前</span></div>
  <div class="metric"><b id="mScore">0</b><span>总分</span></div>
 </div>
</div>
<div class="tabs">
 <button data-tab="record" class="primary">记录</button>
 <button data-tab="timeline">时间轴</button>
 <button data-tab="stats">统计</button>
 <button data-tab="config">权限/分类</button>
 <button data-tab="reflect">反思</button>
 <button data-tab="backup">备份</button>
</div>
<div id="record" class="page active"></div>
<div id="timeline" class="page"></div>
<div id="stats" class="page"></div>
<div id="config" class="page"></div>
<div id="reflect" class="page"></div>
<div id="backup" class="page"></div>
<script>
(function(){
'use strict';
var KEY='student_reflect_v8_fresh';
var ownPackage='';
try{ if(window.AndroidBridge){ ownPackage=AndroidBridge.getOwnPackage(); } }catch(e){}
var now=function(){return Date.now();};
function pad(n){return n<10?'0'+n:''+n;}
function localDate(ts){var d=new Date(ts||Date.now());return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function timeText(ts){var d=new Date(ts);return pad(d.getHours())+':'+pad(d.getMinutes())+':'+pad(d.getSeconds());}
function hm(ms){ms=Math.max(0,Math.round(ms/1000));var h=Math.floor(ms/3600),m=Math.floor((ms%3600)/60),s=ms%60;return h+':'+pad(m)+(h?':'+pad(s):'');}
function min(ms){return Math.round(ms/60000);}
function uid(p){return (p||'id')+'_'+Math.random().toString(36).slice(2,9)+'_'+Date.now().toString(36);}
function esc(s){return (s==null?'':String(s)).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function deepClone(o){return JSON.parse(JSON.stringify(o));}
function defaults(){return {
 version:8, createdAt:now(),
 categories:[
  {id:'learn',name:'普通学习',kind:'learning'},
  {id:'deep',name:'深度学习',kind:'learning'},
  {id:'wechat',name:'微信必要沟通',kind:'allowed'},
  {id:'game',name:'游戏娱乐',kind:'entertainment'},
  {id:'sleep',name:'睡眠',kind:'life'},
  {id:'rest',name:'休息',kind:'life'},
  {id:'meal',name:'吃饭',kind:'life'},
  {id:'sport',name:'运动',kind:'life'},
  {id:'commute',name:'通勤',kind:'life'},
  {id:'other',name:'其他',kind:'other'}
 ],
 subjects:['数学','英语','语文','物理','化学','生物','历史/政治/地理','背诵','编程','非学习'],
 statuses:[
  {id:'math',name:'数学学习',category:'learn',subject:'数学',order:10},
  {id:'english',name:'英语学习',category:'learn',subject:'英语',order:20},
  {id:'deepstudy',name:'深度学习',category:'deep',subject:'非学习',order:30},
  {id:'review',name:'错题复盘',category:'deep',subject:'非学习',order:40},
  {id:'wechat',name:'微信必要沟通',category:'wechat',subject:'非学习',order:50},
  {id:'meal',name:'吃饭',category:'meal',subject:'非学习',order:60},
  {id:'rest',name:'休息',category:'rest',subject:'非学习',order:70},
  {id:'sport',name:'运动',category:'sport',subject:'非学习',order:80},
  {id:'game',name:'游戏娱乐',category:'game',subject:'非学习',order:90},
  {id:'sleep',name:'睡眠',category:'sleep',subject:'非学习',order:100}
 ],
 appTypes:[
  {id:'study_app',name:'学习类应用',allowed:true,severity:0},
  {id:'wechat_app',name:'微信必要沟通',allowed:true,severity:0},
  {id:'short_video',name:'短视频/娱乐刷屏',allowed:false,severity:3},
  {id:'game_app',name:'游戏/游戏软件',allowed:false,severity:3},
  {id:'browser_drift',name:'浏览器/网页跑偏',allowed:false,severity:1.5},
  {id:'chat_drift',name:'非必要聊天',allowed:false,severity:2},
  {id:'video_music',name:'音乐/视频/影视',allowed:false,severity:2.5},
  {id:'tool_drift',name:'工具类但跑偏',allowed:false,severity:1},
  {id:'other_app',name:'其他应用',allowed:false,severity:1.5}
 ],
 appRules:{}, unknownApps:{}, ignoredPackages:{},
 running:{active:false,date:null,dayStart:0,dayEnd:0,currentStatusId:null,currentStart:0},
 segments:[], violations:[], allowedAppUses:[], pendingLeaves:[], reflections:{}, importedUsage:[]
};}
var data=load();
function load(){try{var raw=localStorage.getItem(KEY); if(raw){return migrate(JSON.parse(raw));}}catch(e){} return defaults();}
function migrate(d){var base=defaults(); Object.keys(base).forEach(function(k){if(d[k]===undefined)d[k]=base[k];}); if(!d.appTypes.some(function(t){return t.id==='study_app';}))d.appTypes.unshift(base.appTypes[0]); return d;}
function save(){localStorage.setItem(KEY,JSON.stringify(data));}
function cat(id){return data.categories.find(function(c){return c.id===id;})||data.categories[0];}
function status(id){return data.statuses.find(function(s){return s.id===id;})||data.statuses[0];}
function appType(id){return data.appTypes.find(function(t){return t.id===id;})||null;}
function isLearningStatus(st){if(!st)return false;var c=cat(st.category);return c.kind==='learning';}
function sortedStatuses(){return data.statuses.slice().sort(function(a,b){return (a.order||0)-(b.order||0);});}
function dayStartEnd(date){var p=date.split('-').map(Number);var st=new Date(p[0],p[1]-1,p[2],0,0,0,0).getTime();return [st,st+86400000];}
function segmentsForDate(date){var se=dayStartEnd(date);var arr=data.segments.filter(function(x){return x.end>se[0]&&x.start<se[1];}); if(data.running.active&&data.running.date===date){arr=arr.concat([{id:'running',statusId:data.running.currentStatusId,start:data.running.currentStart,end:now(),running:true}]);}return arr;}
function violationsForDate(date){var se=dayStartEnd(date);return data.violations.filter(function(x){return x.end>se[0]&&x.start<se[1];});}
function reflection(date){if(!data.reflections[date])data.reflections[date]={gain:'',problem:'',tomorrow:'',quality:3,body:3};return data.reflections[date];}
function sumBy(arr,pred){return arr.reduce(function(s,x){return s+(pred(x)?Math.max(0,x.end-x.start):0);},0);}
function scoreDate(date){var segs=segmentsForDate(date), vios=violationsForDate(date), ref=reflection(date);var learn=sumBy(segs,function(x){return isLearningStatus(status(x.statusId));});var deep=sumBy(segs,function(x){var st=status(x.statusId);return st&&st.category==='deep';});var ent=sumBy(segs,function(x){var c=cat(status(x.statusId).category);return c.kind==='entertainment';});var sleep=sumBy(segs,function(x){return status(x.statusId).category==='sleep';});var sport=sumBy(segs,function(x){return status(x.statusId).category==='sport';});var vioMin=vios.reduce(function(s,v){return s+(v.duration||v.end-v.start)/60000;},0);var vioWeight=vios.reduce(function(s,v){return s+((v.duration||v.end-v.start)/60000)*(v.severity||1);},0);var chain=chainInfo(date,segs,vios);var learnScore=clamp(learn/60000/300*100,0,100);var chainScore=chain.score;var deepScore=clamp((deep/60000/90*70)+(Number(ref.quality||3)-1)*7.5,0,100);var focusScore=clamp(100-vioMin*2-vios.length*6-vioWeight*1.4,0,100);var entScore=clamp(100-Math.max(0,ent/60000-60)*1.5-vios.filter(function(v){return (v.severity||0)>=2.5;}).length*5,0,100);var lifeScore=clamp((sleep/3600000>=7&&sleep/3600000<=9?70:(sleep/3600000>=6?50:30))+(sport>0?20:0)+(Number(ref.body||3)-3)*5,0,100);var reflScore=(ref.gain?30:0)+(ref.problem?35:0)+(ref.tomorrow?35:0);var total=learnScore*.25+chainScore*.15+deepScore*.15+focusScore*.20+entScore*.10+lifeScore*.10+reflScore*.05;return {date:date,total:Math.round(total),learn:Math.round(learnScore),chain:Math.round(chainScore),deep:Math.round(deepScore),focus:Math.round(focusScore),ent:Math.round(entScore),life:Math.round(lifeScore),reflect:Math.round(reflScore),learnMs:learn,deepMs:deep,entMs:ent,sleepMs:sleep,sportMs:sport,violations:vios.length,violationMs:vioMin*60000,chainInfo:chain};}
function chainInfo(date,segs,vios){var items=[];segs.forEach(function(s){items.push({type:'seg',start:s.start,end:s.end,seg:s});});vios.forEach(function(v){if(!v.pending)items.push({type:'vio',start:v.start,end:v.end,vio:v});});items.sort(function(a,b){return a.start-b.start;});var best=0,bestSubjects=[],bestDeep=false,curStart=0,curEnd=0,curSubjects={},curDeep=false,active=false,lastLearnEnd=0;function close(){if(active){var len=curEnd-curStart;if(len>best){best=len;bestSubjects=Object.keys(curSubjects);bestDeep=curDeep;}}active=false;curSubjects={};curDeep=false;curStart=0;curEnd=0;lastLearnEnd=0;}items.forEach(function(it){if(it.type==='vio'){close();return;}var st=status(it.seg.statusId), c=cat(st.category);if(c.kind==='learning'){if(!active){active=true;curStart=it.start;curSubjects={};curDeep=false;}else{var gap=it.start-lastLearnEnd;if(gap>15*60000)close(),active=true,curStart=it.start,curSubjects={},curDeep=false;}curEnd=it.end;lastLearnEnd=it.end;if(st.subject&&st.subject!=='非学习')curSubjects[st.subject]=true;if(st.category==='deep')curDeep=true;}else if(active){var gap2=it.end-lastLearnEnd;var allowedBreak=(st.category==='rest'||st.category==='meal'||st.category==='wechat');if(!allowedBreak||gap2>15*60000)close();}}
);close();var hours=best/3600000;var subCount=bestSubjects.length;var score=clamp(hours/2.5*55 + Math.max(0,subCount-1)*15 + (bestDeep?15:0),0,100);return {longestMs:best,subjects:bestSubjects,deep:bestDeep,score:Math.round(score)};}
function periodDates(kind){var today=localDate();var dates=[];if(kind==='today')return [today];var days=7;if(kind==='14')days=14;else if(kind==='30')days=30;else if(kind==='90')days=90;else if(kind==='all'){var set={};data.segments.forEach(function(s){set[localDate(s.start)]=true;});data.violations.forEach(function(v){set[localDate(v.start)]=true;});Object.keys(data.reflections).forEach(function(d){set[d]=true;});return Object.keys(set).sort();}var base=new Date();for(var i=days-1;i>=0;i--){var d=new Date(base.getFullYear(),base.getMonth(),base.getDate()-i);dates.push(localDate(d.getTime()));}return dates;}
function periodScore(kind){var dates=periodDates(kind);var scores=dates.map(scoreDate).filter(function(s){return s.learnMs>0||s.violations>0||reflection(s.date).gain;});if(!scores.length)return null;var keys=['total','learn','chain','deep','focus','ent','life','reflect'];var out={days:scores.length};keys.forEach(function(k){out[k]=Math.round(scores.reduce(function(a,s){return a+s[k];},0)/scores.length);});out.learnMs=scores.reduce(function(a,s){return a+s.learnMs;},0);out.deepMs=scores.reduce(function(a,s){return a+s.deepMs;},0);out.violationMs=scores.reduce(function(a,s){return a+s.violationMs;},0);out.violations=scores.reduce(function(a,s){return a+s.violations;},0);return out;}
function render(){renderTop();renderRecord();renderTimeline();renderStats();renderConfig();renderReflect();renderBackup();}
function renderTop(){var s=scoreDate(localDate());document.getElementById('mLearn').textContent=hm(s.learnMs);document.getElementById('mDeep').textContent=hm(s.deepMs);document.getElementById('mBad').textContent=s.violations+'次';document.getElementById('mCur').textContent=data.running.active?hm(now()-data.running.currentStart):'0:00';document.getElementById('mScore').textContent=s.total;}
function renderRecord(){var p=document.getElementById('record');var cur=data.running.active?status(data.running.currentStatusId):null;var opts=sortedStatuses().map(function(s){return '<option value="'+esc(s.id)+'">'+esc(s.name)+' · '+esc(cat(s.category).name)+' · '+esc(s.subject||'')+'</option>';}).join('');p.innerHTML='<div class="card"><h2>连续记录</h2>'+(data.running.active?'<div class="sub">当前状态</div><div class="bigtime" id="curTimeBig">0:00</div><div class="between"><b>'+esc(cur.name)+'</b><span class="pill">'+esc(cat(cur.category).name)+'</span></div><div class="sub">今日连续计时：<span id="dayTimeBig">0:00</span></div>':'<div class="notice">今天还没有开始。一天开始后中间只能切换状态，不需要停止。</div>')+'<div style="height:10px"></div><select id="statusSelect">'+opts+'</select><div class="row" style="margin-top:8px"><button class="primary" id="startBtn">开始今天</button><button class="good" id="switchBtn">切换状态</button><button class="bad" id="endBtn">结束今天</button></div></div><div class="card"><h3>规则</h3><p class="sub">息屏不算逃离学习。只有学习状态中打开手机并使用其他 App，才会被系统使用记录被动判定为允许使用或违规。</p></div>';if(data.running.currentStatusId){var sel=p.querySelector('#statusSelect'); if(sel)sel.value=data.running.currentStatusId;}p.querySelector('#startBtn').onclick=startDay;p.querySelector('#switchBtn').onclick=switchStatus;p.querySelector('#endBtn').onclick=endDay;}
function finalizeCurrent(t){if(!data.running.active)return;var st=data.running.currentStart,en=t||now();if(en>st+1000)data.segments.push({id:uid('seg'),statusId:data.running.currentStatusId,start:st,end:en});data.running.currentStart=en;}
function startDay(){var sel=document.getElementById('statusSelect');if(data.running.active){alert('今天已经开始了，只能切换状态。');return;}var t=now();data.running={active:true,date:localDate(t),dayStart:t,dayEnd:0,currentStatusId:sel.value,currentStart:t};save();render();}
function switchStatus(){var sel=document.getElementById('statusSelect');if(!data.running.active){alert('先点“开始今天”。');return;}var t=now();finalizeCurrent(t);data.running.currentStatusId=sel.value;data.running.currentStart=t;save();render();}
function endDay(){if(!data.running.active){alert('今天还没有开始。');return;}finalizeCurrent(now());data.running.active=false;data.running.dayEnd=now();save();render();}
function renderTimeline(){var p=document.getElementById('timeline');var date=localDate();var segs=segmentsForDate(date).sort(function(a,b){return a.start-b.start;});var vios=violationsForDate(date).sort(function(a,b){return a.start-b.start;});var html='<div class="card"><h2>今日时间轴</h2><div class="timeline">';if(!segs.length)html+='<p class="sub">暂无记录。</p>';segs.forEach(function(s){var st=status(s.statusId), c=cat(st.category);html+='<div class="seg '+(c.kind==='learning'?'learn':'')+'"><div class="between"><b>'+esc(st.name)+'</b><span>'+timeText(s.start)+' - '+(s.running?'进行中':timeText(s.end))+'</span></div><div class="sub">'+esc(c.name)+' · '+esc(st.subject||'')+' · '+hm(s.end-s.start)+'</div></div>';});html+='</div></div><div class="card"><h2>今日被动违规/待判定</h2>';if(!vios.length)html+='<p class="sub">暂无违规。</p>';vios.forEach(function(v){var t=appType(v.typeId);html+='<div class="listitem"><div class="between"><b>'+esc(v.pending?'待分类/待判定':(t?t.name:'未知'))+'</b><span class="pill danger">'+hm(v.duration||v.end-v.start)+'</span></div><div class="sub">'+timeText(v.start)+' - '+timeText(v.end)+' · '+esc(v.appLabel||v.appPackage||'未知应用')+'</div></div>';});html+='</div>';p.innerHTML=html;}
function renderStats(){var p=document.getElementById('stats');var kind=document.getElementById('periodSel')?document.getElementById('periodSel').value:'today';var ps=periodScore(kind)||scoreDate(localDate());function row(name,val){return '<div class="listitem"><div class="between"><b>'+name+'</b><b>'+val+'</b></div><div class="scorebar"><i style="width:'+clamp(val,0,100)+'%"></i></div></div>';}p.innerHTML='<div class="card"><h2>统计评分</h2><select id="periodSel"><option value="today">今日</option><option value="7">近7天</option><option value="14">近14天</option><option value="30">近30天</option><option value="90">近90天</option><option value="all">全部</option></select><div style="height:8px"></div><div class="bigtime">'+(ps.total||0)+'</div><div class="sub">综合分 · 统计天数 '+(ps.days||1)+'</div></div><div class="card">'+row('学习投入',ps.learn||0)+row('连续学习链',ps.chain||0)+row('深度学习',ps.deep||0)+row('专注纪律',ps.focus||0)+row('娱乐控制',ps.ent||0)+row('生活状态',ps.life||0)+row('反思复盘',ps.reflect||0)+'</div><div class="card"><h3>时间汇总</h3><p>学习：<b>'+hm(ps.learnMs||0)+'</b></p><p>深度：<b>'+hm(ps.deepMs||0)+'</b></p><p>违规：<b>'+hm(ps.violationMs||0)+'</b> / '+(ps.violations||0)+' 次</p></div>';var sel=p.querySelector('#periodSel');sel.value=kind;sel.onchange=renderStats;}
function renderConfig(){var p=document.getElementById('config');var perm=false;try{perm=!!(window.AndroidBridge&&AndroidBridge.hasUsagePermission());}catch(e){}var html='<div class="card"><h2>权限显示模块</h2><div class="notice '+(perm?'ok':'')+'">'+(perm?'已获得使用情况访问权限，可以自动判断学习时使用了哪个 App。':'缺少使用情况访问权限：只能记录时间，不能自动判断你切出去用了哪个 App。')+'</div><button class="primary" id="openUsageBtn" style="margin-top:8px">打开使用情况访问权限</button></div>';html+='<div class="card"><h2>自定义状态与排序</h2><div class="two"><input id="newStatusName" placeholder="状态名，如 数学错题"><select id="newStatusCat">'+data.categories.map(function(c){return '<option value="'+c.id+'">'+esc(c.name)+'</option>';}).join('')+'</select></div><div class="two" style="margin-top:8px"><select id="newStatusSub">'+data.subjects.map(function(s){return '<option>'+esc(s)+'</option>';}).join('')+'</select><button class="primary" id="addStatusBtn">添加状态</button></div><div id="statusList">';sortedStatuses().forEach(function(s,i){html+='<div class="listitem"><div><b>'+esc(s.name)+'</b><div class="sub">'+esc(cat(s.category).name)+' · '+esc(s.subject||'')+'</div></div><div class="row" style="margin-top:6px"><button class="small" data-act="up" data-id="'+s.id+'">上移</button><button class="small" data-act="down" data-id="'+s.id+'">下移</button><button class="small" data-act="top" data-id="'+s.id+'">置顶</button><button class="small" data-act="bottom" data-id="'+s.id+'">置底</button><button class="small bad" data-act="del" data-id="'+s.id+'">删除</button></div></div>';});html+='</div></div>';html+='<div class="card"><h2>App 归类：打勾式选择</h2><p class="sub">应用类型只需要选一次。学习类应用、微信必要沟通属于允许使用；短视频、游戏等会被动生成违规。</p>';var unknown=Object.keys(data.unknownApps||{});if(!unknown.length)html+='<p class="sub">暂无未分类 App。</p>';unknown.forEach(function(pkg){var a=data.unknownApps[pkg];html+='<div class="listitem"><b>'+esc(a.label||pkg)+'</b><div class="sub mono">'+esc(pkg)+'</div><div class="checkgrid">';data.appTypes.forEach(function(t){html+='<button class="checkbtn" data-app="'+esc(pkg)+'" data-type="'+esc(t.id)+'">✓ '+esc(t.name)+'</button>';});html+='</div></div>';});html+='</div>';html+='<div class="card"><h2>应用类型管理</h2><div class="two"><input id="newTypeName" placeholder="新类型名"><input id="newTypeSeverity" type="number" step="0.5" value="1" placeholder="严重度"></div><div class="two" style="margin-top:8px"><select id="newTypeAllowed"><option value="true">允许</option><option value="false">不允许</option></select><button class="primary" id="addTypeBtn">添加类型</button></div>';data.appTypes.forEach(function(t){html+='<div class="typecard"><div class="between"><b>'+esc(t.name)+'</b><span class="pill '+(t.allowed?'ok':'danger')+'">'+(t.allowed?'允许':'不允许')+' / 严重度 '+t.severity+'</span></div><button class="small bad" data-deltype="'+esc(t.id)+'">删除类型</button></div>';});html+='</div>';html+='<div class="card"><h2>应用类型 JSON</h2><button id="exportTypeBtn">导出类型JSON</button><button id="copyTypeBtn">复制类型JSON</button><button id="saveTypeBtn">保存类型JSON文件</button><textarea id="typeJsonBox" placeholder="这里显示/粘贴应用类型 JSON"></textarea><button id="importTypeBtn" class="warn">导入类型JSON</button></div>';p.innerHTML=html;p.querySelector('#openUsageBtn').onclick=function(){try{AndroidBridge.openUsageSettings();}catch(e){alert('无法打开设置');}};p.querySelector('#addStatusBtn').onclick=addStatus;p.querySelectorAll('[data-act]').forEach(function(b){b.onclick=function(){moveStatus(this.dataset.id,this.dataset.act);};});p.querySelectorAll('[data-app]').forEach(function(b){b.onclick=function(){assignAppType(this.dataset.app,this.dataset.type);};});p.querySelector('#addTypeBtn').onclick=addAppType;p.querySelectorAll('[data-deltype]').forEach(function(b){b.onclick=function(){deleteAppType(this.dataset.deltype);};});p.querySelector('#exportTypeBtn').onclick=function(){document.getElementById('typeJsonBox').value=JSON.stringify({appTypes:data.appTypes,appRules:data.appRules},null,2);};p.querySelector('#copyTypeBtn').onclick=function(){copyText(document.getElementById('typeJsonBox').value||JSON.stringify({appTypes:data.appTypes,appRules:data.appRules},null,2));};p.querySelector('#saveTypeBtn').onclick=function(){saveText('student_reflect_app_types_'+localDate()+'.json',document.getElementById('typeJsonBox').value||JSON.stringify({appTypes:data.appTypes,appRules:data.appRules},null,2));};p.querySelector('#importTypeBtn').onclick=importTypeJson;}
function addStatus(){var n=document.getElementById('newStatusName').value.trim();if(!n)return alert('先输入状态名');data.statuses.push({id:uid('st'),name:n,category:document.getElementById('newStatusCat').value,subject:document.getElementById('newStatusSub').value,order:(sortedStatuses().slice(-1)[0]||{order:0}).order+10});save();render();}
function moveStatus(id,act){var arr=sortedStatuses();var idx=arr.findIndex(function(s){return s.id===id;});if(idx<0)return;if(act==='del'){if(!confirm('确定删除这个状态？历史记录仍保留状态ID，但名称可能显示默认。'))return;data.statuses=data.statuses.filter(function(s){return s.id!==id;});save();render();return;}if(act==='up'&&idx>0){var a=arr[idx-1].order;arr[idx-1].order=arr[idx].order;arr[idx].order=a;}if(act==='down'&&idx<arr.length-1){var b=arr[idx+1].order;arr[idx+1].order=arr[idx].order;arr[idx].order=b;}if(act==='top'){arr[idx].order=Math.min.apply(null,arr.map(function(s){return s.order;}))-10;}if(act==='bottom'){arr[idx].order=Math.max.apply(null,arr.map(function(s){return s.order;}))+10;}save();render();}
function addAppType(){var n=document.getElementById('newTypeName').value.trim();if(!n)return alert('输入类型名');data.appTypes.push({id:uid('type'),name:n,allowed:document.getElementById('newTypeAllowed').value==='true',severity:Number(document.getElementById('newTypeSeverity').value||1)});save();render();}
function deleteAppType(id){if(['study_app','wechat_app'].indexOf(id)>=0)return alert('基础类型不建议删除。');if(!confirm('删除类型后，引用它的 App 会变成未分类。确定？'))return;data.appTypes=data.appTypes.filter(function(t){return t.id!==id;});Object.keys(data.appRules).forEach(function(k){if(data.appRules[k]===id)delete data.appRules[k];});save();render();}
function assignAppType(pkg,typeId){data.appRules[pkg]=typeId;if(data.unknownApps[pkg])delete data.unknownApps[pkg];data.violations.forEach(function(v){if(v.appPackage===pkg&&v.pending){var t=appType(typeId);v.typeId=typeId;v.pending=t?t.allowed:false;v.severity=t?t.severity:1;}});save();render();}
function importTypeJson(){try{var o=JSON.parse(document.getElementById('typeJsonBox').value);if(o.appTypes)data.appTypes=o.appTypes;if(o.appRules)data.appRules=o.appRules;save();render();alert('已导入应用类型 JSON');}catch(e){alert('JSON格式错误：'+e.message);}}
function renderReflect(){var p=document.getElementById('reflect');var date=localDate();var r=reflection(date);p.innerHTML='<div class="card"><h2>每日反思</h2><label>学习质量自评 1-5</label><input id="quality" type="number" min="1" max="5" value="'+esc(r.quality)+'"><label>身体精神状态 1-5</label><input id="body" type="number" min="1" max="5" value="'+esc(r.body)+'"><label>今日收获</label><textarea id="gain">'+esc(r.gain)+'</textarea><label>今天最大问题</label><textarea id="problem">'+esc(r.problem)+'</textarea><label>明日改法</label><textarea id="tomorrow">'+esc(r.tomorrow)+'</textarea><button class="primary" id="saveReflectBtn">保存反思</button></div>';p.querySelector('#saveReflectBtn').onclick=function(){var rr=reflection(date);rr.quality=Number(document.getElementById('quality').value||3);rr.body=Number(document.getElementById('body').value||3);rr.gain=document.getElementById('gain').value.trim();rr.problem=document.getElementById('problem').value.trim();rr.tomorrow=document.getElementById('tomorrow').value.trim();save();render();alert('已保存');};}
function renderBackup(){var p=document.getElementById('backup');p.innerHTML='<div class="card"><h2>总数据备份</h2><button id="exportAllBtn">导出到文本框</button><button id="copyAllBtn">复制文本框内容</button><button id="saveAllBtn">保存JSON文件</button><textarea id="backupBox" placeholder="这里显示/粘贴备份 JSON"></textarea><button class="warn" id="importAllBtn">从文本框恢复</button><p class="sub">建议每周导出一次。复制到微信、备忘录或保存为文件都可以。</p></div><div class="card"><h2>导入手机使用记录</h2><p class="sub">格式示例：08:10-08:25 抖音 或 2026-06-19 20:10-20:25 com.xxx 应用名</p><textarea id="usageBox"></textarea><button id="importUsageBtn">导入并重新判定待判定离开</button></div>';p.querySelector('#exportAllBtn').onclick=function(){document.getElementById('backupBox').value=JSON.stringify(data,null,2);};p.querySelector('#copyAllBtn').onclick=function(){copyText(document.getElementById('backupBox').value);};p.querySelector('#saveAllBtn').onclick=function(){saveText('student_reflect_backup_'+localDate()+'.json',document.getElementById('backupBox').value||JSON.stringify(data,null,2));};p.querySelector('#importAllBtn').onclick=function(){try{var o=JSON.parse(document.getElementById('backupBox').value);data=migrate(o);save();render();alert('已恢复');}catch(e){alert('JSON格式错误：'+e.message);}};p.querySelector('#importUsageBtn').onclick=function(){importUsageText(document.getElementById('usageBox').value);};}
function copyText(text){try{if(window.AndroidBridge)AndroidBridge.copyToClipboard(text||'');else navigator.clipboard.writeText(text||'');}catch(e){alert('复制失败，请手动全选复制');}}
function saveText(name,text){try{if(window.AndroidBridge){alert(AndroidBridge.saveTextToDownloads(name,text||''));}else{copyText(text||'');alert('浏览器环境无法直接保存，已尝试复制。');}}catch(e){alert('保存失败：'+e.message);}}
function currentExternalUsage(start,end){var arr=[];try{if(window.AndroidBridge&&AndroidBridge.hasUsagePermission()){arr=JSON.parse(AndroidBridge.queryUsageEvents(start,end));}}catch(e){}return arr;}
window.appOnResumeFromAndroid=function(start,end){if(!data.running.active)return;var st=status(data.running.currentStatusId);if(!isLearningStatus(st))return;if(end-start<3000)return;var usage=currentExternalUsage(start,end);if(!usage||!usage.length){data.pendingLeaves.push({id:uid('leave'),start:start,end:end,reason:'no_usage_permission_or_screen_off'});save();render();return;}processUsageAgainstLearning(start,end,usage);save();render();};
function ignorePackage(pkg,label){pkg=(pkg||'').toLowerCase();label=(label||'').toLowerCase();if(pkg===ownPackage)return true;if(pkg.indexOf('systemui')>=0||pkg.indexOf('launcher')>=0||pkg.indexOf('permissioncontroller')>=0)return true;if(pkg.indexOf('settings')>=0&&label.indexOf('设置')>=0)return true;return false;}
function processUsageAgainstLearning(start,end,usage){usage.forEach(function(u){var dur=(u.end||0)-(u.start||0);if(dur<3000)return;if(ignorePackage(u.package,u.label))return;var typeId=data.appRules[u.package]||data.appRules[u.label];if(!typeId){data.unknownApps[u.package]={package:u.package,label:u.label,lastSeen:now()};addViolation(u,true,null);return;}var t=appType(typeId);if(t&&t.allowed){data.allowedAppUses.push({id:uid('allow'),start:u.start,end:u.end,duration:dur,appPackage:u.package,appLabel:u.label,typeId:typeId});return;}addViolation(u,false,t);});}
function addViolation(u,pending,t){var key=(u.package||'')+'_'+Math.round(u.start/1000)+'_'+Math.round(u.end/1000);if(data.violations.some(function(v){return v.key===key;}))return;data.violations.push({id:uid('vio'),key:key,start:u.start,end:u.end,duration:u.end-u.start,appPackage:u.package,appLabel:u.label,typeId:t?t.id:null,severity:t?t.severity:1,pending:!!pending,source:'usage_stats_passive'});}
function importUsageText(txt){var lines=(txt||'').split(/\n+/), base=localDate();var count=0;lines.forEach(function(line){line=line.trim();if(!line)return;var m=line.match(/(?:(\d{4}-\d{2}-\d{2})\s+)?(\d{1,2}:\d{2})\s*-\s*(\d{1,2}:\d{2})\s+(.+)/);if(!m)return;var d=m[1]||base;var name=m[4].trim();var parts=name.split(/\s+/);var pkg=parts[0].indexOf('.')>0?parts[0]:name;var label=parts[0].indexOf('.')>0?parts.slice(1).join(' ')||pkg:name;function toMs(hmstr){var a=hmstr.split(':').map(Number), ds=d.split('-').map(Number);return new Date(ds[0],ds[1]-1,ds[2],a[0],a[1],0,0).getTime();}data.importedUsage.push({package:pkg,label:label,start:toMs(m[2]),end:toMs(m[3]),duration:toMs(m[3])-toMs(m[2])});count++;});data.pendingLeaves.forEach(function(l){var usage=data.importedUsage.filter(function(u){return u.end>l.start&&u.start<l.end;}).map(function(u){return {package:u.package,label:u.label,start:Math.max(u.start,l.start),end:Math.min(u.end,l.end)};});processUsageAgainstLearning(l.start,l.end,usage);});data.pendingLeaves=[];save();render();alert('已导入 '+count+' 条，并重新判定。');}
function tick(){renderTop();var a=document.getElementById('curTimeBig');if(a&&data.running.active)a.textContent=hm(now()-data.running.currentStart);var b=document.getElementById('dayTimeBig');if(b&&data.running.active)b.textContent=hm(now()-data.running.dayStart);}setInterval(tick,1000);
document.querySelectorAll('.tabs button').forEach(function(btn){btn.onclick=function(){document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('primary');});btn.classList.add('primary');document.querySelectorAll('.page').forEach(function(p){p.classList.remove('active');});document.getElementById(btn.dataset.tab).classList.add('active');render();};});
render();
})();
</script>
