name: Build Android APK v8 Fresh Clean

"on":
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Show project files
        run: |
          echo "Current directory:"
          pwd
          echo "Root files:"
          ls -la
          echo "Workflow files:"
          find .github -maxdepth 3 -type f -print || true
          echo "Gradle files:"
          find . -maxdepth 3 -name "*.gradle" -o -name "settings.gradle" -o -name "gradle.properties"

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace

      - name: List APK outputs
        run: |
          echo "APK files generated:"
          find app/build/outputs/apk -type f -name "*.apk" -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-reflect-v8-fresh-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
