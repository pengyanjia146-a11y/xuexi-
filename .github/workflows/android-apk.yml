
name: Build Android APK v8 Fresh Clean

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.10.2'

      - name: Print project tree
        run: |
          pwd
          find . -maxdepth 4 -type f | sort

      - name: Build debug APK
        run: gradle clean :app:assembleDebug --stacktrace --warning-mode all

      - name: Find APK files
        run: |
          echo "Generated APK files:"
          find app/build/outputs/apk -type f -name "*.apk" -print

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-reflect-v8-fresh-apk
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
